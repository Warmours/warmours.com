<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro — White Armour Systems</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#080808; --surface:#0f0f0f; --border:#1e1e1e; --green:#4caf50; --green-dim:#2e7d32; --white:#f0ede8; --muted:#555; --error:#c62828; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; background:var(--bg); color:var(--white); font-family:'Jost',sans-serif; font-weight:300; letter-spacing:0.04em; overflow-x:hidden; }
    canvas#stars { position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.5; }
    .page { position:relative; z-index:1; min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 24px; }
    .brand { text-align:center; margin-bottom:48px; animation:fadeDown 0.8s ease both; }
    .brand-eyebrow { font-size:10px; font-weight:200; letter-spacing:0.35em; color:var(--muted); text-transform:uppercase; margin-bottom:12px; }
    .brand-name { font-family:'Cormorant Garamond',serif; font-size:clamp(28px,5vw,42px); font-weight:300; letter-spacing:0.18em; text-transform:uppercase; line-height:1; }
    .brand-name span { color:var(--green); }
    .brand-line { width:1px; height:32px; background:linear-gradient(to bottom, var(--green-dim), transparent); margin:20px auto 0; }
    .card { width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border); padding:48px 40px 40px; animation:fadeUp 0.8s 0.2s ease both; position:relative; }
    .card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent, var(--green-dim), transparent); }
    .card-title { font-family:'Cormorant Garamond',serif; font-size:13px; letter-spacing:0.4em; text-transform:uppercase; color:var(--muted); margin-bottom:36px; text-align:center; }
    .field { margin-bottom:24px; }
    .field label { display:block; font-size:9px; letter-spacing:0.3em; text-transform:uppercase; color:var(--muted); margin-bottom:10px; }
    .field input { width:100%; background:transparent; border:none; border-bottom:1px solid var(--border); padding:10px 0; color:var(--white); font-family:'Jost',sans-serif; font-size:14px; font-weight:300; outline:none; transition:border-color 0.3s; }
    .field input:focus { border-bottom-color:var(--green); }
    .field input::placeholder { color:#333; }
    .field-error { font-size:10px; color:var(--error); letter-spacing:0.1em; margin-top:6px; display:none; }
    .field.has-error input { border-bottom-color:var(--error); }
    .field.has-error .field-error { display:block; }
    .divider { display:flex; align-items:center; gap:16px; margin:32px 0; }
    .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    .divider span { font-size:9px; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); }
    .btn-primary { width:100%; padding:14px; background:transparent; border:1px solid var(--green-dim); color:var(--green); font-family:'Jost',sans-serif; font-size:10px; font-weight:300; letter-spacing:0.35em; text-transform:uppercase; cursor:pointer; transition:background 0.3s, color 0.3s; margin-top:8px; }
    .btn-primary:hover { background:var(--green-dim); color:#fff; }
    .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
    .btn-google { width:100%; padding:13px 16px; background:transparent; border:1px solid var(--border); color:var(--white); font-family:'Jost',sans-serif; font-size:10px; font-weight:300; letter-spacing:0.3em; text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:12px; transition:border-color 0.3s; }
    .btn-google:hover { border-color:#555; }
    .btn-google svg { width:16px; height:16px; flex-shrink:0; }
    .form-footer { text-align:center; margin-top:28px; font-size:10px; letter-spacing:0.2em; color:var(--muted); }
    .form-footer a { color:var(--green); text-decoration:none; }
    .msg { display:none; text-align:center; padding:16px; margin-top:16px; font-size:10px; letter-spacing:0.25em; text-transform:uppercase; line-height:1.8; }
    .msg.success { border:1px solid var(--green-dim); background:rgba(46,125,50,0.05); color:var(--green); display:block; }
    .msg.error   { border:1px solid var(--error); background:rgba(198,40,40,0.05); color:#ef9a9a; display:block; }
    .bottom-mark { margin-top:40px; font-size:9px; letter-spacing:0.3em; color:#2a2a2a; text-transform:uppercase; }
    @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeUp   { from{opacity:0;transform:translateY(16px)}  to{opacity:1;transform:translateY(0)} }
  </style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="page">
  <div class="brand">
    <p class="brand-eyebrow">Est. 2024 · Monterrey, México</p>
    <h1 class="brand-name">White <span>Armour</span> Systems</h1>
    <div class="brand-line"></div>
  </div>

  <div class="card">
    <p class="card-title">Acceso al Sistema</p>
    <div id="formWrap">
      <div class="field" id="field-name">
        <label>Nombre completo</label>
        <input type="text" id="nombre" placeholder="Tu nombre">
        <p class="field-error">Este campo es requerido</p>
      </div>
      <div class="field" id="field-email">
        <label>Correo electrónico</label>
        <input type="email" id="correo" placeholder="correo@dominio.com">
        <p class="field-error">Ingresa un correo válido</p>
      </div>
      <div class="field" id="field-pass">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres">
        <p class="field-error">Mínimo 6 caracteres</p>
      </div>
      <button class="btn-primary" id="btnRegister" onclick="registerEmail()">Registrarse →</button>
      <div class="divider"><span>o continúa con</span></div>
      <button class="btn-google" onclick="loginGoogle()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuar con Google
      </button>
    </div>
    <div id="statusMsg" class="msg"></div>
    <p class="form-footer">¿Ya tienes cuenta? <a href="/login.html">Iniciar sesión</a></p>
  </div>
  <p class="bottom-mark">WAS V1.0</p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const app = initializeApp({
    apiKey: "AIzaSyCheGp4C_JyqLkmOtmPGypUuE96xBrfMdU",
    authDomain: "warmours.firebaseapp.com",
    projectId: "warmours",
    storageBucket: "warmours.firebasestorage.app",
    messagingSenderId: "519609402069",
    appId: "1:519609402069:web:517101766d011d8365585c"
  });

  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  function showMsg(text, type) {
    const el = document.getElementById('statusMsg');
    el.textContent = text;
    el.className = 'msg ' + type;
  }

  function redirect(user) {
    showMsg('✓ Bienvenido, ' + (user.displayName || user.email), 'success');
    setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
  }

  window.registerEmail = async function() {
    const nombre = document.getElementById('nombre').value.trim();
    const correo = document.getElementById('correo').value.trim();
    const pass   = document.getElementById('password').value;
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    document.getElementById('field-name').classList.toggle('has-error', !nombre);
    document.getElementById('field-email').classList.toggle('has-error', !emailRe.test(correo));
    document.getElementById('field-pass').classList.toggle('has-error', pass.length < 6);
    if (!nombre || !emailRe.test(correo) || pass.length < 6) return;

    const btn = document.getElementById('btnRegister');
    btn.disabled = true; btn.textContent = 'Registrando...';

    try {
      const cred = await createUserWithEmailAndPassword(auth, correo, pass);
      await updateProfile(cred.user, { displayName: nombre });
      redirect(cred.user);
    } catch(e) {
      const msgs = {
        'auth/email-already-in-use': 'Este correo ya está registrado',
        'auth/weak-password': 'Contraseña muy débil',
        'auth/invalid-email': 'Correo inválido'
      };
      showMsg(msgs[e.code] || e.message, 'error');
      btn.disabled = false; btn.textContent = 'Registrarse →';
    }
  };

  window.loginGoogle = async function() {
    try {
      const cred = await signInWithPopup(auth, provider);
      redirect(cred.user);
    } catch(e) {
      if (e.code !== 'auth/popup-closed-by-user') showMsg('Error Google: ' + e.message, 'error');
    }
  };
</script>

<script>
  (function(){
    const c = document.getElementById('stars'), ctx = c.getContext('2d');
    let s = [];
    function resize(){ c.width=innerWidth; c.height=innerHeight; }
    function init(){ s = Array.from({length:160},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*.8+.2,a:Math.random(),sp:Math.random()*.003+.001})); }
    function draw(){ ctx.clearRect(0,0,c.width,c.height); s.forEach(p=>{p.a+=p.sp; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(240,237,232,${.3+.4*Math.abs(Math.sin(p.a))})`; ctx.fill();}); requestAnimationFrame(draw); }
    window.addEventListener('resize',()=>{resize();init();});
    resize(); init(); draw();
  })();
</script>
</body>
</html>
