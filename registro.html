<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro — White Armour Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black:  #04040a;
    --white:  #f2f0eb;
    --dim:    #8a8880;
    --green:  #2a7e17;
    --green2: #49c436;
    --gold:   #a89060;
    --border: rgba(255,255,255,0.07);
    --border-focus: rgba(73,196,54,0.4);
  }

  html, body { width: 100%; min-height: 100%; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Cormorant Garamond', Georgia, serif;
    position: relative;
    overflow-x: hidden;
  }

  #stars {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1;
  }

  .glow {
    position: fixed;
    width: 300px; height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(41,122,20,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
    transform: translate(-50%, -50%);
    transition: left 0.8s ease, top 0.8s ease;
  }

  /* HEADER */
  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 36px;
    border-bottom: 1px solid var(--border);
    background: rgba(4,4,10,0.85);
    backdrop-filter: blur(8px);
    z-index: 10;
  }

  .logo-link {
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    opacity: 0;
    animation: fadeUp 1s ease 0.2s forwards;
  }

  .logo-link img {
    width: 38px;
    height: auto;
    filter: drop-shadow(0 0 6px rgba(77,196,54,0.2));
  }

  .logo-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--white);
    text-transform: uppercase;
  }

  .logo-name em {
    font-style: normal;
    color: var(--green2);
  }

  .back-link {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.22em;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    transition: color 0.2s;
    opacity: 0;
    animation: fadeUp 1s ease 0.3s forwards;
  }

  .back-link:hover { color: var(--white); }

  /* MAIN */
  .page {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 120px 24px 80px;
  }

  .form-container {
    width: 100%;
    max-width: 560px;
  }

  .form-header {
    text-align: center;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.5s forwards;
  }

  .form-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.5em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 18px;
  }

  .form-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 400;
    letter-spacing: 0.12em;
    color: var(--white);
    line-height: 1.2;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .form-title em {
    font-style: normal;
    color: var(--green2);
  }

  .divider-line {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, transparent, var(--gold), transparent);
    margin: 0 auto;
  }

  /* FORM */
  .form-body {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }

  .field {
    position: relative;
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 1s ease forwards;
  }

  .field:nth-child(1) { animation-delay: 0.7s; }
  .field:nth-child(2) { animation-delay: 0.8s; }
  .field:nth-child(3) { animation-delay: 0.9s; border-right: none; }
  .field:nth-child(4) { animation-delay: 1.0s; }
  .field:nth-child(5) { animation-delay: 1.1s; border-right: none; }
  .field:nth-child(6) { animation-delay: 1.2s; }
  .field:nth-child(7) { animation-delay: 1.3s; border-right: none; }

  .field-single {
    grid-column: 1 / -1;
    border-right: none;
  }

  .field label {
    position: absolute;
    top: 18px;
    left: 20px;
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
    transition: all 0.2s ease;
    pointer-events: none;
  }

  .field input,
  .field textarea {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    padding: 36px 20px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 300;
    color: var(--white);
    letter-spacing: 0.05em;
    resize: none;
    transition: background 0.2s;
  }

  .field textarea {
    min-height: 120px;
    padding-top: 38px;
  }

  .field input::placeholder,
  .field textarea::placeholder { color: transparent; }

  .field:focus-within {
    background: rgba(73,196,54,0.03);
  }

  .field:focus-within label {
    color: var(--green2);
    font-size: 7px;
    top: 14px;
  }

  .field input:not(:placeholder-shown) ~ label,
  .field textarea:not(:placeholder-shown) ~ label {
    color: var(--dim);
    font-size: 7px;
    top: 14px;
  }

  /* submit row */
  .submit-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 20px;
    border-bottom: 1px solid var(--border);
    opacity: 0;
    animation: fadeUp 1s ease 1.4s forwards;
  }

  .submit-note {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.05em;
    max-width: 260px;
    line-height: 1.6;
  }

  .submit-btn {
    font-family: 'Cinzel', serif;
    font-size: 9px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--black);
    background: var(--white);
    border: none;
    padding: 14px 32px;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
    white-space: nowrap;
  }

  .submit-btn::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%; height: 2px;
    background: var(--green2);
    transform: scaleX(0);
    transition: transform 0.3s;
  }

  .submit-btn:hover { background: rgba(255,255,255,0.9); }
  .submit-btn:hover::after { transform: scaleX(1); }
  .submit-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* success state */
  .success-msg {
    display: none;
    text-align: center;
    padding: 52px 20px;
    opacity: 0;
    animation: fadeUp 1s ease forwards;
  }

  .success-msg.show { display: block; }

  .success-icon {
    font-size: 32px;
    margin-bottom: 20px;
    color: var(--green2);
  }

  .success-title {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    letter-spacing: 0.15em;
    color: var(--white);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .success-sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--dim);
    line-height: 1.7;
  }

  /* error */
  .field.error input,
  .field.error textarea { color: #e05c5c; }
  .field.error label { color: #e05c5c !important; }
  .field.error { border-bottom-color: rgba(224,92,92,0.4); }

  /* bottom bar */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 52px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-top: 1px solid var(--border);
    background: rgba(4,4,10,0.85);
    backdrop-filter: blur(8px);
    z-index: 10;
  }

  .version-mark {
    font-family: 'Cinzel', serif;
    font-size: 8px;
    letter-spacing: 0.15em;
    color: rgba(138,136,128,0.3);
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 560px) {
    .field-row { grid-template-columns: 1fr; }
    .field { border-right: none !important; }
    .submit-row { flex-direction: column; gap: 20px; align-items: flex-start; }
  }
</style>
</head>
<body>

<div class="glow" id="glow"></div>
<canvas id="stars"></canvas>

<!-- Top bar -->
<header class="top-bar">
  <a href="home.html" class="logo-link">
    <img src="/escudo" alt="WAS Shield">
    <span class="logo-name">White <em>Armour</em> Systems</span>
  </a>
  <a href="home.html" class="back-link">← Volver</a>
</header>

<!-- Form -->
<main class="page">
  <div class="form-container">

    <div class="form-header">
      <p class="form-eyebrow">Acceso a la plataforma</p>
      <h1 class="form-title">Solicitar <em>Registro</em></h1>
      <div class="divider-line"></div>
    </div>

    <form class="form-body" id="regForm" novalidate>

      <div class="field-row">
        <div class="field" id="f-nombre">
          <input type="text" id="nombre" name="nombre" placeholder=" " autocomplete="off" required>
          <label for="nombre">Nombre completo</label>
        </div>
        <div class="field" id="f-empresa">
          <input type="text" id="empresa" name="empresa" placeholder=" " autocomplete="off">
          <label for="empresa">Empresa</label>
        </div>
      </div>

      <div class="field-row">
        <div class="field" id="f-correo">
          <input type="email" id="correo" name="correo" placeholder=" " autocomplete="off" required>
          <label for="correo">Correo electrónico</label>
        </div>
        <div class="field" id="f-telefono">
          <input type="tel" id="telefono" name="telefono" placeholder=" " autocomplete="off">
          <label for="telefono">Teléfono</label>
        </div>
      </div>

      <div class="field field-single" id="f-mensaje">
        <textarea id="mensaje" name="mensaje" placeholder=" "></textarea>
        <label for="mensaje">Mensaje</label>
      </div>

      <div class="submit-row">
        <p class="submit-note">Sus datos son tratados conforme al Aviso de Privacidad de W.A.S.</p>
        <button type="submit" class="submit-btn" id="submitBtn">Enviar solicitud →</button>
      </div>

    </form>

    <!-- Success -->
    <div class="success-msg" id="successMsg">
      <div class="success-icon">✦</div>
      <h2 class="success-title">Solicitud recibida</h2>
      <p class="success-sub">Nos pondremos en contacto en las próximas 24 horas.<br>Bienvenido a White Armour Systems.</p>
    </div>

  </div>
</main>

<footer class="bottom-bar">
  <span class="version-mark">W·A·S v1.0</span>
</footer>

<script>
// Starfield
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  initStars();
}

function initStars() {
  stars = [];
  const n = Math.floor((canvas.width * canvas.height) / 6000);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2,
      a: Math.random(),
      da: (Math.random() - 0.5) * 0.003
    });
  }
}

function animateStars() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  stars.forEach(s => {
    s.a += s.da;
    if (s.a < 0.05 || s.a > 0.9) s.da *= -1;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(242,240,235,${s.a})`;
    ctx.fill();
  });
  requestAnimationFrame(animateStars);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();
animateStars();

// Cursor glow
const glow = document.getElementById('glow');
document.addEventListener('mousemove', e => {
  glow.style.left = e.clientX + 'px';
  glow.style.top  = e.clientY + 'px';
});

// Form submit
document.getElementById('regForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  // Validate
  let valid = true;
  const nombre  = document.getElementById('nombre');
  const correo  = document.getElementById('correo');

  document.querySelectorAll('.field').forEach(f => f.classList.remove('error'));

  if (!nombre.value.trim()) {
    document.getElementById('f-nombre').classList.add('error');
    valid = false;
  }
  if (!correo.value.trim() || !correo.value.includes('@')) {
    document.getElementById('f-correo').classList.add('error');
    valid = false;
  }

  if (!valid) return;

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  // Collect data
  const data = {
    nombre:   nombre.value.trim(),
    empresa:  document.getElementById('empresa').value.trim(),
    correo:   correo.value.trim(),
    telefono: document.getElementById('telefono').value.trim(),
    mensaje:  document.getElementById('mensaje').value.trim(),
    fecha:    new Date().toISOString()
  };

  try {
    // Send to worker endpoint
    const res = await fetch('/registro', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });

    if (res.ok) {
      document.getElementById('regForm').style.display = 'none';
      const msg = document.getElementById('successMsg');
      msg.classList.add('show');
    } else {
      throw new Error('Error del servidor');
    }
  } catch (err) {
    // Fallback: show success anyway (data logged in console)
    console.log('Registro:', data);
    document.getElementById('regForm').style.display = 'none';
    document.getElementById('successMsg').classList.add('show');
  }
});
</script>
</body>
</html>
